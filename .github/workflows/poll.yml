name: Poll opportunities & build digest

# Runs the Tier 1 pollers on a schedule, refreshes the live data,
# and creates the daily Mailchimp digest. Runs on GitHub's
# infrastructure — it does NOT depend on anyone's computer being on.

on:
  schedule:
    # GitHub Actions free-tier cron is unreliable in low-load periods
    # (early UTC hours) and frequently skips ticks entirely. To improve
    # odds of catching the morning send window, fire every 30 minutes
    # between 02:00 and 06:00 UTC, then every 3 hours the rest of the day.
    # Send window in build_digest.py is widened to 03-08 UTC so any
    # morning tick that DOES land sends the digest. On a good day the
    # brief arrives 4-5am BST; on a bad day 7-9am BST. The send marker
    # ensures only one send per day no matter how many ticks fire.
    #
    # Daytime cadence is every 3 hours (06,09,12,15,18,21 UTC) rather than
    # hourly: each tick that finds new tender data commits a "data: refresh"
    # and pushes, which triggers a Netlify production deploy. Hourly polling
    # produced ~6-10 deploys/day and burned through the monthly credit
    # allowance. Every 3 hours still auto-publishes anything new, just
    # batched into far fewer deploys. poll-stats.json is excluded from the
    # commit so ticks with no real change never deploy.
    - cron: "*/30 2-5 * * *"
    - cron: "0 6-21/3 * * *"
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: "How far back to look (hours). 720 = 30 days."
        required: false
        default: "720"
      force_send:
        description: "Force the digest to send even outside the 03-08 UTC window / even if already sent today"
        required: false
        type: boolean
        default: false
  # Auto-run when the poller or workflow itself changes, so a code update
  # immediately refreshes data without waiting for the next cron tick.
  # Safe from infinite loops: the in-job commit uses GITHUB_TOKEN which
  # does not trigger downstream workflows by design.
  push:
    branches: [main]
    paths:
      - "scripts/poll.py"
      - "scripts/build_digest.py"
      - ".github/workflows/poll.yml"

permissions:
  contents: write          # needed to commit the refreshed data files

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Poll Find a Tender & Contracts Finder
        env:
          # Honour the manual-trigger override.
          # Default 720 (30 days) so the first push backfills a real list.
          # Subsequent cron runs will still default to 720 unless overridden
          # in repo Variables, which is fine: dedup keeps the file the same size.
          POLL_LOOKBACK_HOURS: ${{ inputs.lookback_hours || '720' }}
        run: python scripts/poll.py

      - name: Bundle data for the site
        run: python scripts/bundle.py

      - name: Rebuild sitemap.xml
        # Sitemap entries are per-item URLs; rebuild whenever data changes so
        # search engines don't keep visiting past-deadline opportunities.
        run: python scripts/build_sitemap.py

      - name: Build the daily digest (Mailchimp)
        env:
          MAILCHIMP_API_KEY: ${{ secrets.MAILCHIMP_API_KEY }}
          MAILCHIMP_AUDIENCE_ID: ${{ secrets.MAILCHIMP_AUDIENCE_ID }}
          MAILCHIMP_SERVER_PREFIX: ${{ secrets.MAILCHIMP_SERVER_PREFIX }}
          DIGEST_REPLY_TO: ${{ secrets.DIGEST_REPLY_TO }}
          # Leave DIGEST_AUTOSEND unset to create drafts you review first.
          # Set it to "true" as a secret once you trust the editorial pass.
          DIGEST_AUTOSEND: ${{ secrets.DIGEST_AUTOSEND }}
          # Off until the DAILY/WEEKLY merge fields exist in the Mailchimp audience.
          # When set: daily sends to DAILY=Yes (or blank), weekly to WEEKLY=Yes.
          FREQUENCY_SEGMENT_ENABLED: ${{ secrets.FREQUENCY_SEGMENT_ENABLED }}
          # When triggered manually with force_send=true, bypass the send-window
          # and same-day-marker checks so the digest can fire mid-day after an
          # editorial change.
          FORCE_SEND: ${{ inputs.force_send }}
        run: python scripts/build_digest.py
        continue-on-error: true   # a digest hiccup must not block the data refresh

      - name: Build the weekly digest (Mailchimp)
        # Same script, WEEKLY_MODE=true. The script's own gates (Monday-only,
        # 07-12 UTC window, weekly marker) decide whether to actually send.
        # On Tue-Sun this is a no-op. We still run every cron tick on Mondays
        # so a missed early tick can be picked up by a later one.
        env:
          MAILCHIMP_API_KEY: ${{ secrets.MAILCHIMP_API_KEY }}
          MAILCHIMP_AUDIENCE_ID: ${{ secrets.MAILCHIMP_AUDIENCE_ID }}
          MAILCHIMP_SERVER_PREFIX: ${{ secrets.MAILCHIMP_SERVER_PREFIX }}
          DIGEST_REPLY_TO: ${{ secrets.DIGEST_REPLY_TO }}
          DIGEST_AUTOSEND: ${{ secrets.DIGEST_AUTOSEND }}
          FREQUENCY_SEGMENT_ENABLED: ${{ secrets.FREQUENCY_SEGMENT_ENABLED }}
          FORCE_SEND: ${{ inputs.force_send }}
          WEEKLY_MODE: "true"
        run: python scripts/build_digest.py
        continue-on-error: true

      - name: Commit refreshed data
        # Only commit data files that actually affect what subscribers see on
        # the site or in the brief. Specifically EXCLUDE poll-stats.json
        # because its timestamp changes on every run — committing it would
        # trigger a Netlify deploy every hour even when nothing real changed,
        # exhausting build credits. Stats are still in the run logs.
        run: |
          git config user.name "growth-bot"
          git config user.email "growth-bot@users.noreply.github.com"
          git add data/opportunities-live.json data/last-digest-send.txt assets/js/data.js sitemap.xml 2>/dev/null || true
          # Stage curated files only if they exist (don't error on first run)
          [ -f data/opportunities.json ] && git add data/opportunities.json || true
          [ -f data/grants.json ] && git add data/grants.json || true
          [ -f data/directory.json ] && git add data/directory.json || true
          [ -f data/portal-guides.json ] && git add data/portal-guides.json || true
          [ -f data/last-weekly-digest-send.txt ] && git add data/last-weekly-digest-send.txt || true
          if git diff --staged --quiet; then
            echo "No meaningful data changes — skipping commit (saves Netlify build credits)."
          else
            git commit -m "data: refresh ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
